<!doctype html>
<meta charset="utf-8">
<title>OS Desktop</title>
<style>
  :root{--panel:#111;--line:#2a2a2a;--text:#d8d8d8;--accent:#4aa3ff}
  *{box-sizing:border-box}
  body{margin:0;height:100vh;overflow:hidden;font:14px/1.4 monospace;background:#0f1115;color:var(--text)}
  #desktop{height:calc(100vh - 40px);background:linear-gradient(140deg,#123259,#233f75);padding:14px;display:flex;gap:14px;align-items:flex-start}
  .icon{width:90px;padding:10px 6px;border:1px solid transparent;border-radius:8px;text-align:center;cursor:pointer;color:#fff;user-select:none}
  .icon:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.28)}
  .ico{display:block;font-size:27px;margin-bottom:6px}
  #taskbar{height:40px;background:#111827;border-top:1px solid #334155;display:flex;align-items:center;gap:8px;padding:6px 10px}
  .btn{border:1px solid #445;color:#e5e7eb;background:#1f2937;padding:4px 10px;border-radius:6px;cursor:pointer}
  .btn:hover{background:#374151}
  .window{position:absolute;width:560px;background:var(--panel);border:1px solid #434343;border-radius:8px;box-shadow:0 12px 35px rgba(0,0,0,.45);overflow:hidden}
  .hidden{display:none}
  .title{display:flex;justify-content:space-between;align-items:center;background:#1f2937;border-bottom:1px solid #334155;color:#fff;padding:7px 10px}
  .close{border:0;background:#dc2626;color:#fff;width:22px;height:22px;border-radius:4px;cursor:pointer}
  .terminal-window{right:16px;bottom:56px;height:360px}
  .terminal{height:calc(100% - 39px);display:flex;flex-direction:column;background:#000;color:#36f986}
  #terminalOutput{padding:10px;white-space:pre-wrap;overflow:auto;flex:1}
  .cmd{display:flex;align-items:center;gap:8px;padding:8px 10px;border-top:1px solid #1e1e1e}
  .cmd input{flex:1;background:transparent;border:0;outline:0;color:#36f986;font:inherit}
  .image-window{left:120px;top:80px;width:620px}
  .image-tools{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:10px;border-bottom:1px solid var(--line)}
  #canvas{display:block;background:#fff;margin:10px auto;border:1px solid #ddd}
  #powerScreen{position:fixed;inset:0;background:#000;color:#14f195;display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px}
</style>

<div id="desktop">
  <div class="icon" data-open="image"><span class="ico">🖌️</span>Image Editor</div>
  <div class="icon" data-open="commands"><span class="ico">⌨️</span>Commands</div>
  <div class="icon" id="quitIcon"><span class="ico">⏻</span>Quit</div>
</div>

<div id="taskbar">
  <button class="btn" data-open="commands">Commands</button>
  <button class="btn" data-open="image">Image Editor</button>
  <button class="btn" id="quitBtn">Quit</button>
</div>

<section id="commandsWindow" class="window terminal-window hidden" aria-label="Commands window" role="dialog">
  <div class="title"><span>Commands</span><button class="close" data-close="commands" aria-label="Close commands">×</button></div>
  <div class="terminal">
    <div id="terminalOutput"></div>
    <label class="cmd"><span id="promptLabel">C:\&gt;</span><input id="cmdInput" autocomplete="off"></label>
  </div>
</section>

<section id="imageWindow" class="window image-window hidden" aria-label="Image editor window" role="dialog">
  <div class="title"><span>Image Editor</span><button class="close" data-close="image" aria-label="Close image editor">×</button></div>
  <div class="image-tools">
    <label>Color <input type="color" id="color" value="#1f2937"></label>
    <label>Brush <input type="range" id="size" min="1" max="25" value="4"></label>
    <button class="btn" id="clearCanvas">Clear</button>
    <button class="btn" id="saveCanvas">Save PNG</button>
  </div>
  <canvas id="canvas" width="580" height="320"></canvas>
</section>

<div id="powerScreen">
  <div>System halted.</div>
  <button class="btn" id="restartBtn">Restart</button>
</div>

<script>
  const terminalOutput = document.getElementById('terminalOutput');
  const cmdInput = document.getElementById('cmdInput');
  const promptLabel = document.getElementById('promptLabel');
  const commandsWindow = document.getElementById('commandsWindow');
  const imageWindow = document.getElementById('imageWindow');
  const desktop = document.getElementById('desktop');
  const taskbar = document.getElementById('taskbar');
  const powerScreen = document.getElementById('powerScreen');

  const state = {
    cwd: 'C:\\',
    user: 'guest',
    startedAt: new Date(),
    history: [],
    historyIndex: -1,
    files: {
      'readme.txt': 'Open-Source OS desktop shell.',
      'notes.txt': 'Try: help, open image, touch file.txt'
    }
  };
  const helpText = [
    'help, cls, clear, echo, date, time, ver, ls, dir, cat <file>,',
    'pwd, whoami, uptime, touch <file>, write <file> <text>,',
    'del <file>, rm <file>, rename <old> <new>, open <commands|cmd|image|paint>, quit'
  ].join(' ');

  function writeLine(text = '') {
    terminalOutput.append(document.createTextNode(text + '\n'));
    terminalOutput.scrollTop = terminalOutput.scrollHeight;
  }

  function promptString() {
    return state.cwd + '> ';
  }

  function setPrompt() {
    promptLabel.textContent = promptString();
  }

  function printBanner() {
    writeLine('Open-Source OS v3 DOS Desktop');
    writeLine('Type HELP and press Enter.');
  }

  function openWindow(name) {
    if (name === 'commands') {
      commandsWindow.classList.remove('hidden');
      commandsWindow.style.right = '16px';
      commandsWindow.style.bottom = '56px';
      cmdInput.focus();
      return;
    }
    if (name === 'image') {
      imageWindow.classList.remove('hidden');
    }
  }

  function closeWindow(name) {
    if (name === 'commands') commandsWindow.classList.add('hidden');
    if (name === 'image') imageWindow.classList.add('hidden');
  }

  function powerOff() {
    desktop.style.display = 'none';
    taskbar.style.display = 'none';
    commandsWindow.classList.add('hidden');
    imageWindow.classList.add('hidden');
    powerScreen.style.display = 'flex';
  }

  function powerOn() {
    desktop.style.display = 'flex';
    taskbar.style.display = 'flex';
    powerScreen.style.display = 'none';
    openWindow('commands');
    writeLine('System restarted.');
  }

  function fileList() {
    const keys = Object.keys(state.files);
    return keys.length ? keys.join('  ') : '(empty)';
  }

  function formatUptime(ms) {
    const totalSeconds = Math.floor(ms / 1000);
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;
    if (hours > 0) return `${hours}h ${minutes}m ${seconds}s`;
    if (minutes > 0) return `${minutes}m ${seconds}s`;
    return `${seconds}s`;
  }

  function runCommand(raw) {
    const line = raw.trim();
    writeLine(promptString() + line);
    if (!line) return;
    const parts = line.split(/\s+/);
    const command = parts[0].toLowerCase();
    const args = parts.slice(1);

    if (command === 'help') writeLine(helpText);
    else if (command === 'cls' || command === 'clear') terminalOutput.textContent = '';
    else if (command === 'echo') writeLine(args.join(' '));
    else if (command === 'date') writeLine(new Date().toDateString());
    else if (command === 'time') writeLine(new Date().toLocaleTimeString());
    else if (command === 'ver') writeLine('Open-Source OS v3 DOS Desktop');
    else if (command === 'ls' || command === 'dir') writeLine(fileList());
    else if (command === 'cat') writeLine(state.files[args[0]] ?? 'File not found');
    else if (command === 'pwd') writeLine(state.cwd);
    else if (command === 'whoami') writeLine(state.user);
    else if (command === 'uptime') writeLine(formatUptime(Date.now() - state.startedAt.getTime()));
    else if (command === 'touch') {
      if (!args[0]) writeLine('Usage: touch <file>');
      else {
        if (!(args[0] in state.files)) state.files[args[0]] = '';
        writeLine('OK');
      }
    } else if (command === 'write') {
      const [file, ...textParts] = args;
      if (!file || textParts.length === 0) writeLine('Usage: write <file> <text>');
      else {
        state.files[file] = textParts.join(' ');
        writeLine('OK');
      }
    } else if (command === 'del' || command === 'rm') {
      if (!args[0]) writeLine('Usage: del <file>');
      else if (!(args[0] in state.files)) writeLine('File not found');
      else {
        delete state.files[args[0]];
        writeLine('Deleted');
      }
    } else if (command === 'rename') {
      if (args.length < 2) writeLine('Usage: rename <old> <new>');
      else if (!(args[0] in state.files)) writeLine('File not found');
      else {
        state.files[args[1]] = state.files[args[0]];
        delete state.files[args[0]];
        writeLine('Renamed');
      }
    } else if (command === 'open' || command === 'start') {
      const target = (args[0] || '').toLowerCase();
      if (target === 'commands' || target === 'cmd') openWindow('commands');
      else if (target === 'image' || target === 'paint') openWindow('image');
      else writeLine('Usage: open <commands|cmd|image|paint>');
    } else if (command === 'quit' || command === 'exit' || command === 'shutdown') {
      powerOff();
    } else writeLine('Bad command or file name');
  }

  cmdInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const value = cmdInput.value;
      state.history.push(value);
      state.historyIndex = state.history.length;
      runCommand(value);
      cmdInput.value = '';
      return;
    }
    if (e.key === 'ArrowUp') {
      if (!state.history.length) return;
      state.historyIndex = Math.max(0, state.historyIndex - 1);
      cmdInput.value = state.history[state.historyIndex] ?? '';
      e.preventDefault();
      return;
    }
    if (e.key === 'ArrowDown') {
      if (!state.history.length) return;
      state.historyIndex = Math.min(state.history.length, state.historyIndex + 1);
      cmdInput.value = state.history[state.historyIndex] ?? '';
      e.preventDefault();
    }
  });

  document.querySelectorAll('[data-open]').forEach(el => {
    el.addEventListener('click', () => openWindow(el.getAttribute('data-open')));
  });
  document.querySelectorAll('[data-close]').forEach(el => {
    el.addEventListener('click', () => closeWindow(el.getAttribute('data-close')));
  });
  document.getElementById('quitBtn').addEventListener('click', powerOff);
  document.getElementById('quitIcon').addEventListener('click', powerOff);
  document.getElementById('restartBtn').addEventListener('click', powerOn);

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const color = document.getElementById('color');
  const size = document.getElementById('size');
  let drawing = false;

  function point(e) {
    const rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }
  canvas.addEventListener('mousedown', e => {
    drawing = true;
    const p = point(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  });
  canvas.addEventListener('mousemove', e => {
    if (!drawing) return;
    const p = point(e);
    ctx.lineWidth = Number(size.value);
    ctx.strokeStyle = color.value;
    ctx.lineCap = 'round';
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
  });
  ['mouseup', 'mouseleave'].forEach(evt => canvas.addEventListener(evt, () => drawing = false));

  document.getElementById('clearCanvas').addEventListener('click', () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  });
  document.getElementById('saveCanvas').addEventListener('click', () => {
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = 'image.png';
    a.click();
  });

  setPrompt();
  printBanner();
  openWindow('commands');
</script>
