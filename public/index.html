<!doctype html><meta charset=utf-8><title>OS</title><style>body{margin:0;background:#000;color:#0f0;font:16px/1.3 monospace}#t{padding:10px;white-space:pre-wrap}input{background:transparent;border:0;outline:0;color:#0f0;font:inherit;width:80%}</style><div id=t></div><script>
const t=document.getElementById('t'),files={'readme.txt':'Tiny Open-Source OS (DOS-like) in HTML + Node.js.'};
let cwd='C:\\',h=[];
const out=s=>t.append(document.createTextNode(s+'\n'));
function prompt(){const l=document.createElement('div');l.innerHTML=`${cwd}> <input autofocus>`;t.append(l);const i=l.querySelector('input');i.focus();i.onkeydown=e=>{if(e.key==='Enter'){const c=i.value.trim();h.push(c);run(c);i.disabled=1;prompt();window.scrollTo(0,document.body.scrollHeight)}if(e.key==='ArrowUp'){i.value=h[h.length-1]||''}}}
function run(c){out(cwd+'> '+c);const [k,...a]=c.split(' '),v=a.join(' ');if(!k)return; if(k==='help')out('help, cls, echo, date, time, ver, ls, cat <file>'); else if(k==='cls')t.textContent=''; else if(k==='echo')out(v); else if(k==='date')out(new Date().toDateString()); else if(k==='time')out(new Date().toLocaleTimeString()); else if(k==='ver')out('Open-Source OS v0.1'); else if(k==='ls')out(Object.keys(files).join('  ')||'(empty)'); else if(k==='cat')out(files[v]??'File not found'); else out('Bad command or file name');}
out('Open-Source OS v0.1');out('Type HELP and press Enter.');prompt();
</script>
